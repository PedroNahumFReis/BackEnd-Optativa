# Ativa o perfil de desenvolvimento
spring.profiles.active=dev

# Configurações do Banco (Copiadas do seu arquivo de teste, mas ajustadas)
spring.datasource.url=jdbc:mysql://localhost:3306/api_test
spring.datasource.username=root
spring.datasource.password=manbo
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA - Mudei para update para você não perder os dados toda hora
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Configuração da aula do professor
notificador.email.host=smtp.pedro.com.br

# 1. Define o caminho e nome do arquivo (A pasta 'logs' será criada na raiz)
logging.file.name=logs/app.log

# 2. Define o nível de log para o SEU pacote (ajuste com o nome do seu pacote)
# Use DEBUG para ver tudo ou INFO para ver apenas o principal
logging.level.com.pedro.api=DEBUG

# 3. Opcional: Define o nível para o Hibernate (se quiser ver o SQL no arquivo de log)
logging.level.org.hibernate.SQL=DEBUG