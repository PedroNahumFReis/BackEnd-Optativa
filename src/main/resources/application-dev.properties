# Configurações do Banco (Criando um banco novo e limpo do zero)
spring.datasource.url=jdbc:mysql://localhost:3306/api_kanban?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=manbo
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true

# Configurações para GMAIL
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=pedronahum90@gmail.com
spring.mail.password= # COLOQUE SUA SENHA DE APP AQUI (NÃO COMITAR)
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Configurações de LOG
logging.file.name=logs/app.log
logging.level.com.pedro.api=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# CONFIGURAÇÕES DE SEGURANÇA (OAUTH2 JWT & CORS)
security.client-id=myclientid
security.client-secret=myclientsecret
security.jwt.duration=86400
cors.origins=http://localhost:3000,http://localhost:5173

# Estratégia de Migração de Banco (Flyway assume o controle)
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Configurações de Recuperação de Senha
email.password-recover.uri=http://localhost:3000/recover?token=
email.password-recover.token.minutes=30
