# Configuraçőes do Banco (Criando um banco novo e limpo do zero)
spring.datasource.url=jdbc:mysql://localhost:3306/api_kanban?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=manbo
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true

# Configuraçőes para GMAIL
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=pedronahum90@gmail.com
spring.mail.password= # COLOQUE SUA SENHA DE APP AQUI (NĂO COMITAR)
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Configuraçőes de LOG
logging.file.name=logs/app.log
logging.level.com.pedro.api=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# CONFIGURAÇŐES DE SEGURANÇA (OAUTH2 JWT & CORS)
security.client-id=myclientid
security.client-secret=myclientsecret
security.jwt.duration=86400 
cors.origins=http://localhost:3000,http://localhost:5173

# Estratégia de Migraçăo de Banco (Flyway assume o controle)
# Altere esta linha de 'validate' para 'none'
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true