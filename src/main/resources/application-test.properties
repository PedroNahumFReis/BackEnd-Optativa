spring.datasource.url=jdbc:mysql://localhost:3306/api_test
spring.datasource.username=root
spring.datasource.password=manbo

spring.jpa.hibernate.ddl-auto=create-drop

# 1. Define o caminho e nome do arquivo (A pasta 'logs' será criada na raiz)
logging.file.name=logs/app.log

# 2. Define o nível de log para o SEU pacote (ajuste com o nome do seu pacote)
# Use DEBUG para ver tudo ou INFO para ver apenas o principal
logging.level.com.pedro.api=DEBUG

# 3. Opcional: Define o nível para o Hibernate (se quiser ver o SQL no arquivo de log)
logging.level.org.hibernate.SQL=DEBUG

# ---- SPRING SECURITY OAUTH2 JWT CONFIG ----

# O ID e Secret da sua aplicaçăo (O Postman vai precisar disso para gerar o token)
security.client-id=myclientid
security.client-secret=myclientsecret

# Tempo de duraçăo do Token JWT em segundos (Ex: 86400 = 24 horas)
security.jwt.duration=86400

# CORS: Quais domínios podem acessar a sua API? (O * significa que todos podem)
cors.origins=http://localhost:3000,http://localhost:5173